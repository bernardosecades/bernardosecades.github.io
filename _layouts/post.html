---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
      {% if page.lang == 'es' %}
        {{ page.date | date: "%d/%m/%Y" }}
      {% else %}
        {{ page.date | date: "%b %-d, %Y" }}
      {% endif %}
    </time>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <p class="back-link">
    <a href="{{ '/' | append: page.lang | append: '/' | relative_url }}">
      {% if page.lang == 'es' %}← Volver al blog{% else %}← Back to blog{% endif %}
    </a>
  </p>
</article>
