<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      {% if page.app and page.doc %}
      <nav class="lang-switcher" aria-label="Language">
        <a href="{{ site.baseurl }}/apps/{{ page.app }}/{{ page.doc }}/en/"{% if page.lang == 'en' %} class="active" aria-current="page"{% endif %}>EN</a>
        <a href="{{ site.baseurl }}/apps/{{ page.app }}/{{ page.doc }}/es/"{% if page.lang == 'es' %} class="active" aria-current="page"{% endif %}>ES</a>
        <a href="{{ site.baseurl }}/apps/{{ page.app }}/{{ page.doc }}/pt/"{% if page.lang == 'pt' %} class="active" aria-current="page"{% endif %}>PT</a>
      </nav>
      {% endif %}
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>{{ site.author }} &copy; {{ "now" | date: "%Y" }} &middot; <a href="{{ '/' | relative_url }}">All apps</a></p>
    </div>
  </footer>
</body>
</html>
