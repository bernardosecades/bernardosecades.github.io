title: "AI Tips & Tricks"
description: "Tips and tricks for working with AI — bilingual blog (EN / ES)"
author: "Bernardo"
email: ""

# For GitHub Pages project site set this to "/your-repo-name"
# For a user/org site (username.github.io) leave it empty
baseurl: ""
url: "https://bernardosecades.github.io"

# No external theme — custom layout in _layouts/
theme: ~

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /:categories/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude/
