title: "AI Tips & Tricks"
description: "Tips and tricks for working with AI — bilingual blog (EN / ES)"
author: "Bernardo"
email: ""

# For GitHub Pages project site set this to "/your-repo-name"
# For a user/org site (username.github.io) leave it empty
baseurl: ""
url: "https://claudecodesessions.com"

# No external theme — custom layout in _layouts/
theme: ~

plugins:
  - jekyll-feed
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Google Analytics 4 — paste your Measurement ID (G-XXXXXXXXXX). Leave empty to disable.
google_analytics: "G-XKJT29TKF0"

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /:categories/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - bernie_next_posts.md
  - .claude/
