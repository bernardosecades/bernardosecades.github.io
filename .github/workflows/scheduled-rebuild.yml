name: Scheduled Pages rebuild

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  pages: write

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Request GitHub Pages build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/pages/builds"
